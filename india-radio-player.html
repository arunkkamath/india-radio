<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>India Radio</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #12100e;
      --shell: #f5efe4;
      --panel: #fffaf1;
      --panel-2: #eee2d0;
      --ink: #201b17;
      --muted: #776a5d;
      --line: #dfd1bd;
      --accent: #cb3f2d;
      --accent-2: #0d6f68;
      --accent-3: #e4ab2c;
      --shadow: 0 24px 70px rgba(11, 10, 9, 0.28);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: 1fr;
      width: min(100%, 470px);
      min-height: 100svh;
      margin: 0 auto;
      background:
        linear-gradient(180deg, rgba(203, 63, 45, 0.12), transparent 210px),
        var(--shell);
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06), var(--shadow);
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: max(16px, env(safe-area-inset-top)) 16px 12px;
      background: transparent;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 40px;
      height: 40px;
      flex: 0 0 auto;
      border-radius: 8px;
      color: white;
      background: var(--accent);
      box-shadow: 0 10px 24px rgba(203, 63, 45, 0.25);
    }

    h1 {
      margin: 0;
      font-size: 1.1rem;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .brand p,
    .now p,
    .station p,
    .empty,
    .meta {
      margin: 0;
      color: var(--muted);
    }

    .controls {
      display: grid;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: #4d4035;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .search-wrap {
      position: relative;
    }

    .icon {
      width: 19px;
      height: 19px;
      flex: 0 0 auto;
    }

    .search-wrap .icon {
      position: absolute;
      top: 50%;
      left: 13px;
      color: var(--muted);
      transform: translateY(-50%);
      pointer-events: none;
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(255, 250, 241, 0.9);
      color: var(--ink);
      outline: 0;
    }

    input {
      padding: 0 13px 0 42px;
    }

    select {
      padding: 0 12px;
    }

    input:focus,
    select:focus {
      border-color: var(--accent-2);
      box-shadow: 0 0 0 3px rgba(18, 110, 118, 0.13);
    }

    .chips {
      display: flex;
      flex-wrap: nowrap;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: none;
    }

    .chip {
      flex: 0 0 auto;
      min-height: 32px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: #4d4035;
      background: rgba(255, 250, 241, 0.78);
      font-size: 0.82rem;
    }

    .chip[aria-pressed="true"] {
      border-color: var(--accent-2);
      color: white;
      background: var(--accent-2);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 9px;
      min-height: 42px;
      padding: 9px 11px;
      border: 1px solid rgba(18, 110, 118, 0.18);
      border-radius: 12px;
      background: rgba(238, 226, 208, 0.76);
      color: #31565b;
      font-size: 0.82rem;
    }

    .main {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-width: 0;
      padding: 0 16px calc(104px + env(safe-area-inset-bottom));
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .toolbar h2 {
      margin: 0;
      font-size: 1.18rem;
      line-height: 1;
      letter-spacing: 0;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: nowrap;
      justify-content: flex-end;
    }

    .icon-button,
    .primary-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      border-radius: 12px;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }

    .icon-button {
      width: 38px;
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
    }

    .primary-button {
      gap: 8px;
      padding: 0 12px;
      color: white;
      background: var(--ink);
    }

    .icon-button:hover,
    .primary-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(35, 44, 44, 0.14);
    }

    .stations {
      display: grid;
      grid-template-columns: 1fr;
      align-content: start;
      gap: 9px;
      min-width: 0;
    }

    .station {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 10px;
      min-height: 76px;
      padding: 10px;
      border: 1px solid rgba(29, 37, 40, 0.1);
      border-radius: 14px;
      background: rgba(255, 250, 241, 0.86);
      box-shadow: 0 8px 24px rgba(35, 31, 27, 0.07);
    }

    .station.is-playing {
      border-color: rgba(203, 63, 45, 0.46);
      background: white;
      box-shadow: 0 12px 28px rgba(203, 63, 45, 0.12);
    }

    .station-head {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .logo {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      flex: 0 0 auto;
      overflow: hidden;
      border: 1px solid rgba(29, 37, 40, 0.08);
      border-radius: 12px;
      background: #e8eee9;
      color: var(--accent-2);
      font-weight: 800;
      font-size: 0.78rem;
    }

    .logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .station h3 {
      margin: 0;
      min-width: 0;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.95rem;
      line-height: 1.2;
    }

    .station p {
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.78rem;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      grid-column: 1 / -1;
      padding-left: 54px;
    }

    .tag {
      max-width: 100%;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(239, 176, 40, 0.16);
      color: #71520f;
      font-size: 0.68rem;
      overflow-wrap: anywhere;
    }

    .station-actions {
      display: flex;
      gap: 7px;
      align-items: center;
      justify-content: flex-end;
      grid-column: 2;
      grid-row: 1 / 3;
    }

    .play {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      min-height: 40px;
      border-radius: 999px;
      color: white;
      background: var(--accent);
      font-weight: 750;
    }

    .play span {
      position: absolute;
      width: 1px;
      height: 1px;
      overflow: hidden;
      clip: rect(0 0 0 0);
      white-space: nowrap;
    }

    .favorite {
      width: 36px;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.74);
      color: #8b6a12;
    }

    .favorite[aria-pressed="true"] {
      border-color: rgba(239, 176, 40, 0.46);
      background: rgba(239, 176, 40, 0.22);
    }

    .player {
      position: fixed;
      bottom: max(12px, env(safe-area-inset-bottom));
      left: 50%;
      width: min(calc(100% - 32px), 438px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: center;
      gap: 12px;
      min-height: 78px;
      padding: 11px 12px;
      border: 1px solid rgba(29, 37, 40, 0.12);
      border-radius: 18px;
      background: rgba(32, 27, 23, 0.96);
      color: white;
      box-shadow: var(--shadow);
      z-index: 4;
    }

    .now {
      display: flex;
      align-items: center;
      gap: 13px;
      min-width: 0;
    }

    .now .logo {
      width: 46px;
      height: 46px;
      background: #263235;
      color: white;
      border-color: rgba(255, 255, 255, 0.12);
    }

    .now h2 {
      margin: 0 0 4px;
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 0.92rem;
      letter-spacing: 0;
    }

    .now p {
      color: rgba(255, 255, 255, 0.68);
      font-size: 0.78rem;
    }

    .player-buttons {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .player-buttons .icon-button {
      background: rgba(255, 255, 255, 0.1);
      color: white;
      border-color: rgba(255, 255, 255, 0.16);
    }

    .volume {
      width: 86px;
      accent-color: var(--accent-3);
    }

    .loader {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(18, 110, 118, 0.22);
      border-top-color: var(--accent-2);
      border-radius: 999px;
      animation: spin 0.8s linear infinite;
    }

    .empty {
      grid-column: 1 / -1;
      display: grid;
      place-items: center;
      min-height: 260px;
      border: 1px dashed rgba(96, 112, 119, 0.45);
      border-radius: 8px;
      text-align: center;
      background: rgba(255, 253, 248, 0.48);
    }

    @keyframes spin {
      to {
        transform: rotate(1turn);
      }
    }

    @media (max-width: 820px) {
      body {
        background: var(--shell);
      }
    }

    @media (min-width: 760px) {
      body {
        padding: 26px;
        background:
          radial-gradient(circle at 50% 0, rgba(203, 63, 45, 0.28), transparent 34%),
          var(--bg);
      }

      .app {
        min-height: calc(100svh - 52px);
        border-radius: 28px;
        overflow: hidden;
      }

      .stations {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <div class="mark" aria-hidden="true">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"></path><path d="M7.8 16.2a6 6 0 0 1 0-8.5"></path><circle cx="12" cy="12" r="2"></circle><path d="M16.2 7.8a6 6 0 0 1 0 8.5"></path><path d="M19.1 4.9c3.9 3.9 3.9 10.2 0 14.1"></path>
          </svg>
        </div>
        <div>
          <h1>India Radio</h1>
          <p>Live stations from Radio Browser</p>
        </div>
      </div>

      <div class="controls">
        <div class="field">
          <label for="search">Search</label>
          <div class="search-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.3-4.3"></path>
            </svg>
            <input id="search" type="search" placeholder="Mirchi, Vividh Bharati, Tamil..." autocomplete="off">
          </div>
        </div>

        <div class="field">
          <label for="language">Language</label>
          <select id="language">
            <option value="">All Indian stations</option>
            <option value="hindi">Hindi</option>
            <option value="english">English</option>
            <option value="tamil">Tamil</option>
            <option value="telugu">Telugu</option>
            <option value="malayalam">Malayalam</option>
            <option value="kannada">Kannada</option>
            <option value="bengali">Bengali</option>
            <option value="marathi">Marathi</option>
            <option value="punjabi">Punjabi</option>
            <option value="gujarati">Gujarati</option>
            <option value="urdu">Urdu</option>
          </select>
        </div>

        <div class="field">
          <label>Browse</label>
          <div class="chips" id="quickFilters">
            <button class="chip" type="button" data-filter="top" aria-pressed="true">Top voted</button>
            <button class="chip" type="button" data-filter="recent">Recently clicked</button>
            <button class="chip" type="button" data-filter="favorites">Favorites</button>
          </div>
        </div>
      </div>

      <div class="status" id="status">
        <span class="loader" aria-hidden="true"></span>
        <span>Finding Indian stations...</span>
      </div>
    </aside>

    <main class="main">
      <div class="toolbar">
        <h2 id="heading">Live Indian Radio</h2>
        <div class="actions">
          <button class="icon-button" id="refresh" type="button" title="Refresh stations" aria-label="Refresh stations">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-9 9 9.8 9.8 0 0 1-6.7-2.7"></path><path d="M3 12a9 9 0 0 1 15.7-6.1"></path><path d="M3 21v-5h5"></path><path d="M21 3v5h-5"></path>
            </svg>
          </button>
          <button class="primary-button" id="random" type="button">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M16 3h5v5"></path><path d="M4 20 21 3"></path><path d="M21 16v5h-5"></path><path d="m15 15 6 6"></path><path d="m4 4 5 5"></path>
            </svg>
            Shuffle
          </button>
        </div>
      </div>

      <section class="stations" id="stations" aria-live="polite"></section>

      <section class="player" aria-label="Audio player">
        <div class="now" id="nowPlaying">
          <div class="logo">IR</div>
          <div>
            <h2>Choose a station</h2>
            <p>Streams open in the built-in player when available.</p>
          </div>
        </div>
        <div class="player-buttons">
          <button class="icon-button" id="stop" type="button" title="Stop" aria-label="Stop">
            <svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <rect x="6" y="6" width="12" height="12" rx="1"></rect>
            </svg>
          </button>
          <input class="volume" id="volume" type="range" min="0" max="1" step="0.01" value="0.8" aria-label="Volume">
        </div>
      </section>
    </main>
  </div>

  <audio id="audio"></audio>

  <script>
    const API_BASES = [
      "https://de1.api.radio-browser.info",
      "https://nl1.api.radio-browser.info",
      "https://at1.api.radio-browser.info"
    ];

    const state = {
      apiBase: API_BASES[0],
      stations: [],
      currentFilter: "top",
      query: "",
      language: "",
      currentStation: null,
      favorites: new Set(JSON.parse(localStorage.getItem("indiaRadioFavorites") || "[]"))
    };

    const stationsEl = document.querySelector("#stations");
    const statusEl = document.querySelector("#status");
    const searchEl = document.querySelector("#search");
    const languageEl = document.querySelector("#language");
    const headingEl = document.querySelector("#heading");
    const nowPlayingEl = document.querySelector("#nowPlaying");
    const audioEl = document.querySelector("#audio");
    const volumeEl = document.querySelector("#volume");

    const svg = {
      play: '<svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"></path></svg>',
      star: '<svg class="icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="m12 2 3.1 6.4 7 .9-5.1 4.9 1.3 6.9-6.3-3.4-6.2 3.4 1.2-6.9-5-4.9 7-.9z"></path></svg>',
      radio: '<svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4.9 19.1C1 15.2 1 8.8 4.9 4.9"></path><path d="M7.8 16.2a6 6 0 0 1 0-8.5"></path><circle cx="12" cy="12" r="2"></circle><path d="M16.2 7.8a6 6 0 0 1 0 8.5"></path></svg>'
    };

    function setStatus(message, busy = false) {
      statusEl.innerHTML = `${busy ? '<span class="loader" aria-hidden="true"></span>' : svg.radio}<span>${message}</span>`;
    }

    function sanitizeText(value) {
      return String(value || "").replace(/[&<>]/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;"
      })[char]);
    }

    function sanitizeAttr(value) {
      return sanitizeText(value).replace(/["']/g, (char) => ({
        '"': "&quot;",
        "'": "&#39;"
      })[char]);
    }

    function stationLogo(station) {
      if (station.favicon) {
        return `<img src="${sanitizeAttr(station.favicon)}" alt="" loading="lazy" onerror="this.remove(); this.parentElement.textContent='${initials(station.name)}';">`;
      }
      return initials(station.name);
    }

    function initials(name) {
      return sanitizeText(name).split(/\s+/).slice(0, 2).map((part) => part[0]).join("").toUpperCase() || "IR";
    }

    function stationTags(station) {
      const tags = [station.language, station.codec, station.bitrate ? `${station.bitrate} kbps` : ""]
        .filter(Boolean)
        .flatMap((item) => String(item).split(","))
        .map((item) => item.trim())
        .filter(Boolean)
        .slice(0, 3);
      return tags.map((tag) => `<span class="tag">${sanitizeText(tag)}</span>`).join("");
    }

    function buildUrl(path, params = {}) {
      const url = new URL(path, state.apiBase);
      Object.entries(params).forEach(([key, value]) => {
        if (value !== "" && value !== null && value !== undefined) {
          url.searchParams.set(key, value);
        }
      });
      return url;
    }

    async function apiFetch(path, params) {
      let lastError;
      for (const base of [state.apiBase, ...API_BASES.filter((item) => item !== state.apiBase)]) {
        state.apiBase = base;
        try {
          const response = await fetch(buildUrl(path, params));
          if (!response.ok) throw new Error(`Radio Browser returned ${response.status}`);
          return response.json();
        } catch (error) {
          lastError = error;
        }
      }
      throw lastError;
    }

    async function loadStations() {
      setStatus("Finding Indian stations...", true);
      const order = state.currentFilter === "recent" ? "clicktimestamp" : "votes";
      const reverse = true;
      const params = {
        countrycode: "IN",
        hidebroken: true,
        limit: 90,
        order,
        reverse,
        name: state.query,
        language: state.language
      };

      try {
        const stations = await apiFetch("/json/stations/search", params);
        state.stations = dedupeStations(stations);
        renderStations();
        setStatus(`${state.stations.length} stations loaded from ${new URL(state.apiBase).host}`);
      } catch (error) {
        setStatus("Could not reach Radio Browser. Try refresh in a moment.");
        stationsEl.innerHTML = `<div class="empty">Radio Browser is not responding right now.</div>`;
      }
    }

    function dedupeStations(stations) {
      const seen = new Set();
      return stations.filter((station) => {
        const key = station.stationuuid || station.url_resolved || station.name;
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return station.url_resolved || station.url;
      });
    }

    function visibleStations() {
      if (state.currentFilter === "favorites") {
        return state.stations.filter((station) => state.favorites.has(station.stationuuid));
      }
      return state.stations;
    }

    function renderStations() {
      const stations = visibleStations();
      headingEl.textContent = state.currentFilter === "favorites" ? "Favorite Stations" : "Live Indian Radio";

      if (!stations.length) {
        stationsEl.innerHTML = `<div class="empty">${state.currentFilter === "favorites" ? "Favorite stations will appear here." : "No stations matched those filters."}</div>`;
        return;
      }

      stationsEl.innerHTML = stations.map((station) => {
        const isFavorite = state.favorites.has(station.stationuuid);
        const isPlaying = state.currentStation && state.currentStation.stationuuid === station.stationuuid;
        return `
          <article class="station ${isPlaying ? "is-playing" : ""}">
            <div class="station-head">
              <div class="logo">${stationLogo(station)}</div>
              <div>
                <h3>${sanitizeText(station.name)}</h3>
                <p>${sanitizeText(station.state || station.country || "India")}</p>
              </div>
            </div>
            <div class="tags">${stationTags(station)}</div>
            <div class="station-actions">
              <button class="play" type="button" data-play="${sanitizeAttr(station.stationuuid)}">
                ${svg.play}
                <span>Play</span>
              </button>
              <button class="favorite" type="button" data-favorite="${sanitizeAttr(station.stationuuid)}" aria-pressed="${isFavorite}" title="Favorite" aria-label="Favorite ${sanitizeAttr(station.name)}">
                ${svg.star}
              </button>
            </div>
          </article>
        `;
      }).join("");
    }

    async function playStation(station) {
      if (!station) return;
      state.currentStation = station;
      updateNowPlaying("Connecting...");

      try {
        if (station.stationuuid) {
          await fetch(buildUrl(`/json/url/${station.stationuuid}`), { mode: "no-cors" });
        }
      } catch (_) {
        /* The click endpoint is best-effort and should not block playback. */
      }

      audioEl.src = station.url_resolved || station.url;
      audioEl.volume = Number(volumeEl.value);

      try {
        await audioEl.play();
        updateNowPlaying("On air");
        renderStations();
      } catch (error) {
        updateNowPlaying("This stream could not be played in the browser.");
      }
    }

    function updateNowPlaying(line) {
      const station = state.currentStation;
      nowPlayingEl.innerHTML = station ? `
        <div class="logo">${stationLogo(station)}</div>
        <div>
          <h2>${sanitizeText(station.name)}</h2>
          <p>${sanitizeText(line)}${station.codec ? ` · ${sanitizeText(station.codec)}` : ""}</p>
        </div>
      ` : `
        <div class="logo">IR</div>
        <div>
          <h2>Choose a station</h2>
          <p>Streams open in the built-in player when available.</p>
        </div>
      `;
    }

    function persistFavorites() {
      localStorage.setItem("indiaRadioFavorites", JSON.stringify([...state.favorites]));
    }

    let searchTimer;
    searchEl.addEventListener("input", () => {
      state.query = searchEl.value.trim();
      clearTimeout(searchTimer);
      searchTimer = setTimeout(loadStations, 350);
    });

    languageEl.addEventListener("change", () => {
      state.language = languageEl.value;
      loadStations();
    });

    document.querySelector("#quickFilters").addEventListener("click", (event) => {
      const button = event.target.closest("[data-filter]");
      if (!button) return;
      state.currentFilter = button.dataset.filter;
      document.querySelectorAll("[data-filter]").forEach((item) => {
        item.setAttribute("aria-pressed", String(item === button));
      });
      if (state.currentFilter === "favorites") {
        renderStations();
      } else {
        loadStations();
      }
    });

    stationsEl.addEventListener("click", (event) => {
      const playButton = event.target.closest("[data-play]");
      const favoriteButton = event.target.closest("[data-favorite]");

      if (playButton) {
        const station = state.stations.find((item) => item.stationuuid === playButton.dataset.play);
        playStation(station);
      }

      if (favoriteButton) {
        const id = favoriteButton.dataset.favorite;
        state.favorites.has(id) ? state.favorites.delete(id) : state.favorites.add(id);
        persistFavorites();
        renderStations();
      }
    });

    document.querySelector("#refresh").addEventListener("click", loadStations);
    document.querySelector("#random").addEventListener("click", () => {
      const stations = visibleStations();
      playStation(stations[Math.floor(Math.random() * stations.length)]);
    });

    document.querySelector("#stop").addEventListener("click", () => {
      audioEl.pause();
      audioEl.removeAttribute("src");
      audioEl.load();
      state.currentStation = null;
      updateNowPlaying();
      renderStations();
    });

    volumeEl.addEventListener("input", () => {
      audioEl.volume = Number(volumeEl.value);
    });

    audioEl.addEventListener("waiting", () => updateNowPlaying("Buffering..."));
    audioEl.addEventListener("playing", () => updateNowPlaying("On air"));
    audioEl.addEventListener("error", () => updateNowPlaying("This stream could not be played in the browser."));

    loadStations();
  </script>
</body>
</html>
